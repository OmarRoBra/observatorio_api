name: Keep Supabase Alive

on:
  schedule:
    # Cada 4 días a las 8:00 AM UTC
    - cron: '0 8 */4 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API para mantener Supabase activo
        run: |
          echo "Haciendo ping a la API..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://observatorio-api-dhp4.vercel.app/news)
          echo "Respuesta HTTP: $STATUS"
          echo "✅ Ping completado - Supabase sigue activo"
